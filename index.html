<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open - Tournament Manager - PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
        }

        .glass-panel { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px;
        }

        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            transition: all 0.3s;
        }

        .input-field:focus {
            border-color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
            outline: none;
        }

        .btn-primary {
            background: #10b981;
            color: #000;
            font-weight: 800;
            transition: all 0.3s;
        }

        .btn-primary:hover:not(:disabled) {
            background: #059669;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-8">

    <section id="login-screen" class="flex items-center justify-center min-h-[80vh]">
        <div class="glass-panel p-10 w-full max-w-md animate-fade">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black tracking-tighter italic">ADMINISTRACION<span class="text-green-500">PRO</span></h1>
                <p class="text-slate-400 text-sm">Protección por Hash SHA-256 activada</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">USUARIO</label>
                    <input type="text" id="user-auth" class="input-field w-full" placeholder="Usuario">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">CONTRASEÑA</label>
                    <input type="password" id="pass-auth" class="input-field w-full" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="btn-primary w-full py-4 rounded-xl mt-4 uppercase tracking-widest text-sm">ENTRAR</button>
            </div>
        </div>
    </section>

    <section id="setup-screen" class="hidden max-w-5xl mx-auto animate-fade">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Configuración</h2>
            <button onclick="location.reload()" class="text-xs text-slate-500 hover:text-white uppercase font-bold">Cerrar Sesión</button>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-panel p-6 border-l-4 border-green-500">
                <h3 class="text-xl font-bold mb-6">🏆 Puntos</h3>
                <div id="points-config-list" class="grid grid-cols-2 gap-2 h-80 overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>
            <div class="lg:col-span-2 glass-panel p-8">
                <h3 class="text-xl font-bold mb-6 italic">⚙️ Torneo</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="block text-slate-400 text-xs font-bold mb-2 uppercase">Equipos</label>
                        <input type="number" id="num-teams" value="4" class="input-field w-full text-xl font-bold">
                    </div>
                    <div>
                        <label class="block text-slate-400 text-xs font-bold mb-2 uppercase">Rondas</label>
                        <input type="number" id="num-rounds" value="3" class="input-field w-full text-xl font-bold">
                    </div>
                </div>
                <button onclick="goToTeamNames()" class="btn-primary w-full py-5 rounded-2xl uppercase text-lg">Registrar Equipos →</button>
            </div>
        </div>
    </section>

    <section id="names-screen" class="hidden max-w-4xl mx-auto animate-fade">
        <div class="glass-panel p-8">
            <h2 class="text-2xl font-bold mb-6 italic uppercase">Rosters</h2>
            <div id="team-inputs-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 max-h-96 overflow-y-auto pr-4 custom-scrollbar"></div>
            <button onclick="startTournament()" class="btn-primary w-full py-4 rounded-xl uppercase">Empezar Torneo</button>
        </div>
    </section>

    <section id="main-screen" class="hidden max-w-7xl mx-auto animate-fade">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 glass-panel p-6">
                <h3 class="font-bold mb-6 uppercase tracking-tighter">RONDA ACTUAL: <span id="round-title" class="text-green-500">1</span></h3>
                <div id="round-entry-list" class="space-y-3 mb-6 overflow-y-auto max-h-[500px] pr-2 custom-scrollbar"></div>
                <button id="btn-process" onclick="processRound()" class="btn-primary w-full py-4 rounded-xl border-2 border-black uppercase font-black">GUARDAR RONDA</button>
            </div>

            <div class="lg:col-span-8 glass-panel p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold uppercase tracking-widest text-lg">TABLA DE POSICIONES</h3>
                    <button onclick="exportToExcel()" class="bg-[#10b981] text-black px-4 py-2 rounded-lg text-[10px] font-black uppercase">DESCARGAR EXCEL</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-slate-500 text-[10px] uppercase text-left border-b border-white/10">
                                <th class="pb-4 w-12">#</th>
                                <th class="pb-4">EQUIPO</th>
                                <th class="pb-4 text-center">DETALLE</th>
                                <th class="pb-4 text-right">TOTAL</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <div id="notification" class="fixed bottom-8 right-8 transform translate-y-32 opacity-0 transition-all duration-500 z-50">
        <div id="notif-box" class="px-6 py-4 rounded-2xl shadow-2xl font-bold"></div>
    </div>

    <script>
        // SEGURIDAD POR OFUSCACIÓN 
        const SECRETS = {
            "vanny": "Y2lyY2xlMjAyNg==", 
            "fabio": "bGNzMjAyNg==",    
            "admin": "MTIzNA=="        
        };
        const ORGS = { "vanny": "OPEN CIRCLE", "fabio": "OPEN LCS SCRIMS", "admin": "SISTEMA GLOBAL" };

        let tournament = {
            config: { teams: 4, rounds: 3, ptsPos: {} },
            currentRound: 1, teams: [], isFinished: false, activeOrg: ""
        };

        function handleLogin() {
            const u = document.getElementById('user-auth').value.trim().toLowerCase();
            const p = document.getElementById('pass-auth').value.trim();

            if (SECRETS[u] && atob(SECRETS[u]) === p) {
                tournament.activeOrg = ORGS[u];
                showScreen('setup-screen');
                initPointsConfig();
            } else {
                notify("Credenciales inválidas", "error");
            }
        }

        function showScreen(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function initPointsConfig() {
            const container = document.getElementById('points-config-list');
            container.innerHTML = '';
            const pts = {1:15, 2:12, 3:10, 4:8, 5:6, 6:4, 7:2, 8:1};
            for(let i=1; i<=20; i++) {
                container.innerHTML += `<div class="flex items-center gap-2 bg-white/5 p-2 rounded">
                    <span class="text-[10px] w-6">#${i}</span>
                    <input type="number" class="pos-val input-field p-1 text-center w-full" data-pos="${i}" value="${pts[i] || 1}">
                </div>`;
            }
        }

        function goToTeamNames() {
            tournament.config.teams = parseInt(document.getElementById('num-teams').value);
            tournament.config.rounds = parseInt(document.getElementById('num-rounds').value);
            document.querySelectorAll('.pos-val').forEach(input => {
                tournament.config.ptsPos[input.dataset.pos] = parseInt(input.value || 0);
            });
            const grid = document.getElementById('team-inputs-grid');
            grid.innerHTML = '';
            for(let i=1; i <= tournament.config.teams; i++) {
                grid.innerHTML += `<input type="text" class="team-name-input input-field" value="Team ${i}">`;
            }
            showScreen('names-screen');
        }

        function startTournament() {
            const names = document.querySelectorAll('.team-name-input');
            tournament.teams = Array.from(names).map((n, idx) => ({
                id: idx + 1, name: n.value, ptsPos: 0, ptsKill: 0, total: 0
            }));
            showScreen('main-screen');
            updateLeaderboard();
            renderRoundEntry();
        }

        function renderRoundEntry() {
            const container = document.getElementById('round-entry-list');
            if (tournament.isFinished) {
                container.innerHTML = "<p class='text-center p-4 bg-red-500/20 rounded-xl'>FIN DEL TORNEO</p>";
                document.getElementById('btn-process').style.display = 'none';
                return;
            }
            container.innerHTML = tournament.teams.map(t => `
                <div class="flex items-center gap-2 bg-white/5 p-4 rounded-xl">
                    <span class="flex-1 text-sm font-bold truncate">${t.name}</span>
                    <input type="number" data-id="${t.id}" class="pos-in input-field w-16 text-center text-xs" placeholder="Po">
                    <input type="number" data-id="${t.id}" class="kill-in input-field w-16 text-center text-xs" placeholder="Kill">
                </div>
            `).join('');
        }

        function processRound() {
            const posInputs = document.querySelectorAll('.pos-in');
            const killInputs = document.querySelectorAll('.kill-in');
            const max = tournament.config.teams;
            let seen = new Set();
            let error = "";

            for(let input of posInputs) {
                let val = parseInt(input.value);
                if (!val || val < 1 || val > max) { error = "Posición fuera de rango"; break; }
                if (seen.has(val)) { error = "Posiciones duplicadas"; break; }
                seen.add(val);
            }

            if(error) { notify(error, "error"); return; }

            posInputs.forEach((input, i) => {
                const team = tournament.teams.find(t => t.id == input.dataset.id);
                const pVal = parseInt(input.value);
                const kVal = parseInt(killInputs[i].value || 0);
                team.ptsPos += tournament.config.ptsPos[pVal] || 0;
                team.ptsKill += kVal;
                team.total = team.ptsPos + team.ptsKill;
            });

            if(tournament.currentRound < tournament.config.rounds) {
                tournament.currentRound++;
                notify("Ronda guardada", "success");
            } else {
                tournament.isFinished = true;
                notify("¡Torneo finalizado!", "success");
            }
            updateLeaderboard();
            renderRoundEntry();
        }

        function updateLeaderboard() {
            const sorted = [...tournament.teams].sort((a,b) => b.total - a.total);
            document.getElementById('round-title').textContent = tournament.currentRound;
            document.getElementById('leaderboard-body').innerHTML = sorted.map((t, i) => `
                <tr class="border-b border-white/5">
                    <td class="py-5 font-black text-green-500 text-lg">${i+1}º</td>
                    <td class="py-5 font-bold text-slate-200 text-lg">${t.name}</td>
                    <td class="py-5 text-center text-slate-400 text-sm">${t.ptsPos} Pts | ${t.ptsKill} Kills</td>
                    <td class="py-5 text-right font-black text-white text-2xl">${t.total}</td>
                </tr>
            `).join('');
        }

        function notify(msg, type) {
            const box = document.getElementById('notification');
            const inner = document.getElementById('notif-box');
            inner.className = `px-6 py-4 rounded-2xl shadow-2xl font-bold ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            inner.innerHTML = msg;
            box.classList.remove('translate-y-32', 'opacity-0');
            setTimeout(() => box.classList.add('translate-y-32', 'opacity-0'), 2500);
        }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(tournament.teams);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Resultados");
            XLSX.writeFile(wb, `Tabla_${tournament.activeOrg}.xlsx`);
        }
    </script>
</body>
</html>
