<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Master - LCS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
            min-height: 100vh;
            padding: 20px;
        }

        /* Estilo de Contenedores Principales (Glassmorphism) */
        .main-card { 
            background: rgba(30, 41, 59, 0.5); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px;
        }

        /* Inputs Estilo Imagen */
        .input-field {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 1rem;
            width: 100%;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        /* Colores de Acento */
        .text-cyan-accent { color: #22d3ee; }
        .text-blue-accent { color: #818cf8; }
        .text-yellow-accent { color: #fbbf24; }
        .bg-blue-button { background-color: #2563eb; }
        .bg-green-button { background-color: #10b981; }
        
        .stat-box {
            background: rgba(30, 41, 59, 0.4);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
        }

        .leader-box {
            border: 1px solid rgba(251, 191, 36, 0.4);
        }

        /* Botón de Reinicio Estilizado */
        .btn-reset {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            background: #ef4444;
            border-color: #f87171;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center">

    <header class="text-center mb-10">
        <h1 class="text-5xl font-extrabold tracking-tight text-cyan-accent uppercase">Tournament Master</h1>
        <p class="text-slate-400 text-sm tracking-widest mt-2 uppercase">E-Sports Management System</p>
    </header>

    <div id="app" class="w-full max-w-6xl">
        
        <section id="setup-screen" class="main-card p-8 max-w-4xl mx-auto animate__animated animate__fadeIn">
            <div class="flex items-center gap-4 mb-8">
                <div class="bg-indigo-600 p-3 rounded-xl shadow-lg shadow-indigo-500/20">⚙️</div>
                <h2 class="text-2xl font-bold">Configuración General</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div>
                    <label class="block text-slate-400 text-sm mb-3">Número de Equipos</label>
                    <input type="number" id="num-teams" value="8" min="2" class="input-field text-xl font-bold">
                </div>
                <div>
                    <label class="block text-slate-400 text-sm mb-3">Total de Rondas</label>
                    <input type="number" id="num-rounds" value="5" min="1" class="input-field text-xl font-bold">
                </div>
            </div>

            <button onclick="goToTeamNames()" class="w-full bg-blue-button hover:bg-blue-700 text-white font-bold py-5 rounded-2xl transition-all uppercase tracking-wider shadow-lg shadow-blue-500/20">
                Configurar Equipos →
            </button>
        </section>

        <section id="names-screen" class="hidden main-card p-8 max-w-4xl mx-auto">
            <h2 class="text-2xl font-bold mb-8">Registrar Equipos</h2>
            <div id="team-inputs-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 max-h-[400px] overflow-y-auto pr-2">
                </div>
            <div class="flex gap-4">
                <button onclick="showScreen('setup-screen')" class="flex-1 bg-slate-700 hover:bg-slate-600 font-bold py-4 rounded-2xl transition">Atrás</button>
                <button onclick="startTournament()" class="flex-[2] bg-green-button hover:bg-green-600 font-bold py-4 rounded-2xl uppercase tracking-widest transition shadow-lg shadow-green-500/20">
                    ¡Empezar Torneo!
                </button>
            </div>
        </section>

        <section id="main-screen" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="stat-box main-card">
                    <p class="text-slate-400 text-xs uppercase tracking-widest mb-1">Ronda</p>
                    <p id="stat-round" class="text-4xl font-extrabold text-blue-accent">1/5</p>
                </div>
                <div class="stat-box main-card leader-box">
                    <p class="text-slate-400 text-xs uppercase tracking-widest mb-1">Líder</p>
                    <p id="stat-leader" class="text-4xl font-extrabold text-yellow-accent">---</p>
                </div>
                <div class="stat-box main-card">
                    <p class="text-slate-400 text-xs uppercase tracking-widest mb-1">Restantes</p>
                    <p id="stat-left" class="text-4xl font-extrabold text-cyan-accent">4</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 main-card p-6 border-t-4 border-blue-500">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Resultados Ronda</h2>
                        <span id="round-num-indicator" class="text-2xl font-bold text-blue-accent">1</span>
                    </div>
                    <div id="round-entry-list" class="space-y-4 mb-6">
                        </div>
                    <button onclick="processRound()" class="w-full bg-blue-button hover:bg-blue-700 py-4 rounded-xl font-bold uppercase transition-all shadow-lg shadow-blue-500/20">
                        Confirmar Ronda
                    </button>
                </div>

                <div class="lg:col-span-8 main-card p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Clasificación General</h2>
                        <button onclick="copyTable()" class="bg-slate-700 hover:bg-slate-600 text-xs px-5 py-2 rounded-full font-bold uppercase tracking-tighter">Copiar Tabla</button>
                    </div>
                    <table class="w-full text-left">
                        <thead class="text-slate-500 text-xs uppercase border-b border-slate-800">
                            <tr>
                                <th class="pb-4">Pos</th>
                                <th class="pb-4">Equipo</th>
                                <th class="pb-4 text-right">Pts</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body" class="divide-y divide-slate-800/50">
                            </tbody>
                    </table>
                </div>
            </div>
            
            <div id="reset-container" class="mt-10 pb-10 flex justify-center">
                <button onclick="confirmReset()" class="btn-reset flex items-center gap-4 text-white font-bold py-4 px-10 rounded-2xl shadow-xl transition-all duration-300">
                    <span class="text-2xl">🔄</span>
                    <div class="text-left">
                        <p class="text-[10px] uppercase tracking-[0.2em] opacity-60 leading-none mb-1">Acción Destructiva</p>
                        <p class="text-sm uppercase tracking-wider">Finalizar y Reiniciar Todo</p>
                    </div>
                </button>
            </div>
        </section>
    </div>

    <div id="notification" class="fixed bottom-10 right-10 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <div id="notif-box" class="px-8 py-4 rounded-2xl font-bold shadow-2xl text-white"></div>
    </div>

    <script>
        let tournament = {
            config: { teams: 0, rounds: 0 },
            currentRound: 1,
            teams: []
        };

        const POINTS_SYSTEM = { 1:15, 2:12, 3:10, 4:8, 5:6, 6:4, 7:2, 8:1, 9:1, 10:1, 11:1, 12:1, 13:1, 14:1, 15:1, 16:1 };

        function showScreen(id) {
            ['setup-screen', 'names-screen', 'main-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function goToTeamNames() {
            tournament.config.teams = parseInt(document.getElementById('num-teams').value);
            tournament.config.rounds = parseInt(document.getElementById('num-rounds').value);
            
            const grid = document.getElementById('team-inputs-grid');
            grid.innerHTML = '';
            for(let i=1; i <= tournament.config.teams; i++) {
                grid.innerHTML += `
                    <input type="text" placeholder="Nombre Equipo ${i}" class="input-field team-name-input" value="Equipo ${i}">
                `;
            }
            showScreen('names-screen');
        }

        function startTournament() {
            const nameInputs = document.querySelectorAll('.team-name-input');
            tournament.teams = Array.from(nameInputs).map((input, idx) => ({
                id: idx + 1,
                name: input.value || `Equipo ${idx + 1}`,
                score: 0
            }));
            updateUI();
            renderRoundEntry();
            showScreen('main-screen');
        }

        function renderRoundEntry() {
            const list = document.getElementById('round-entry-list');
            list.innerHTML = tournament.teams.map(t => `
                <div class="flex items-center gap-3">
                    <span class="flex-1 text-sm font-bold truncate text-slate-300">${t.name}</span>
                    <input type="number" placeholder="Pos" data-id="${t.id}" class="pos-in input-field !p-2 w-16 text-center text-blue-accent font-bold">
                    <input type="number" placeholder="Kills" data-id="${t.id}" class="kills-in input-field !p-2 w-16 text-center text-slate-400">
                </div>
            `).join('');
        }

        function processRound() {
            const posInputs = document.querySelectorAll('.pos-in');
            const killInputs = document.querySelectorAll('.kills-in');
            const usedPos = new Set();
            let updates = [];

            for(let i=0; i < posInputs.length; i++) {
                const p = parseInt(posInputs[i].value);
                const k = parseInt(killInputs[i].value || 0);
                const id = parseInt(posInputs[i].dataset.id);

                if(!p || p < 1 || p > tournament.config.teams) return notify(`Error: Equipo ${id} sin posición válida`);
                if(usedPos.has(p)) return notify(`Error: La posición ${p} ya está asignada`);
                
                usedPos.add(p);
                updates.push({ id, pts: (POINTS_SYSTEM[p] || 0) + k });
            }

            updates.forEach(upd => {
                const team = tournament.teams.find(t => t.id === upd.id);
                team.score += upd.pts;
            });

            if(tournament.currentRound < tournament.config.rounds) {
                tournament.currentRound++;
                notify(`Ronda registrada con éxito`, false);
                updateUI();
                renderRoundEntry();
            } else {
                updateUI();
                document.getElementById('round-entry-list').parentElement.innerHTML = `
                    <div class="text-center py-10 animate__animated animate__pulse">
                        <p class="text-7xl mb-4">🏆</p>
                        <h2 class="text-2xl font-bold uppercase tracking-widest text-yellow-accent">Torneo Finalizado</h2>
                    </div>
                `;
            }
        }

        function updateUI() {
            document.getElementById('stat-round').textContent = `${tournament.currentRound}/${tournament.config.rounds}`;
            document.getElementById('stat-left').textContent = Math.max(0, tournament.config.rounds - tournament.currentRound);
            document.getElementById('round-num-indicator').textContent = tournament.currentRound;

            const sorted = [...tournament.teams].sort((a,b) => b.score - a.score);
            document.getElementById('stat-leader').textContent = sorted[0].score > 0 ? sorted[0].name : "---";

            const body = document.getElementById('leaderboard-body');
            body.innerHTML = sorted.map((t, i) => `
                <tr class="group hover:bg-white/5 transition">
                    <td class="py-4 font-bold text-blue-accent text-lg">${i+1}</td>
                    <td class="py-4 font-bold text-slate-200">${t.name}</td>
                    <td class="py-4 text-right font-bold text-cyan-accent text-lg">${t.score}</td>
                </tr>
            `).join('');
        }

        function notify(msg, error = true) {
            const box = document.getElementById('notification');
            const inner = document.getElementById('notif-box');
            inner.textContent = msg;
            inner.className = `px-8 py-4 rounded-2xl font-bold shadow-2xl text-white ${error ? 'bg-red-500' : 'bg-green-600'}`;
            box.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => box.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function confirmReset() {
            if (confirm('¿Estás seguro de que deseas finalizar el torneo? Se perderán todos los datos registrados.')) {
                location.reload();
            }
        }

        function copyTable() {
            const sorted = [...tournament.teams].sort((a,b) => b.score - a.score);
            let txt = "🏆 RANKING FINAL - TOURNAMENT MASTER 🏆\n\n";
            sorted.forEach((t, i) => txt += `${i+1}º ${t.name} » ${t.score} Puntos\n`);
            navigator.clipboard.writeText(txt);
            notify("¡Ranking copiado!", false);
        }
    </script>
</body>
</html>
