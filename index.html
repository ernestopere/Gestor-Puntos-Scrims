<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Master - OPEN LCS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }

        /* Estilo Glassmorphism de la imagen */
        .glass-card { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px;
        }

        .input-dark {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .input-dark:focus {
            border-color: #6366f1;
            outline: none;
            background: rgba(15, 23, 42, 0.9);
        }

        /* Colores exactos de la imagen */
        .text-accent-blue { color: #818cf8; }
        .text-accent-cyan { color: #22d3ee; }
        .text-accent-yellow { color: #fbbf24; }
        .border-accent-yellow { border: 1px solid rgba(251, 191, 36, 0.5); }

        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="app" class="max-w-6xl mx-auto">
        
        <section id="setup-screen" class="glass-card p-8 animate__animated animate__fadeIn max-w-md mx-auto mt-10">
            <h1 class="text-3xl font-extrabold text-center mb-8 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">
                CONFIGURACIÓN
            </h1>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Equipos</label>
                    <input type="number" id="num-teams" value="6" class="input-dark w-full p-4 text-xl">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Rondas</label>
                    <input type="number" id="num-rounds" value="5" class="input-dark w-full p-4 text-xl">
                </div>
                <button onclick="initApp()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition-all">
                    Siguiente →
                </button>
            </div>
        </section>

        <section id="main-screen" class="hidden animate__animated animate__fadeIn space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass-card p-6 text-center">
                    <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Ronda</p>
                    <p id="stat-round" class="text-4xl font-bold text-accent-blue">1/5</p>
                </div>
                <div class="glass-card p-6 text-center border-accent-yellow">
                    <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Líder</p>
                    <p id="stat-leader" class="text-4xl font-bold text-accent-yellow">---</p>
                </div>
                <div class="glass-card p-6 text-center">
                    <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Restantes</p>
                    <p id="stat-left" class="text-4xl font-bold text-accent-cyan">4</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <div class="lg:col-span-4 glass-card p-6">
                    <h2 class="text-2xl font-bold mb-6">Resultados Ronda <span id="round-title" class="text-accent-blue">1</span></h2>
                    <div id="inputs-container" class="space-y-4 mb-6">
                        </div>
                    <button onclick="processRound()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold transition">
                        Confirmar Resultados
                    </button>
                </div>

                <div class="lg:col-span-8 glass-card p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Clasificación General</h2>
                        <button onclick="copyToClipboard()" class="bg-slate-700 hover:bg-slate-600 text-xs px-4 py-2 rounded-full transition">Copiar Tabla</button>
                    </div>
                    <div class="overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="text-slate-500 text-xs uppercase border-b border-slate-700">
                                <tr>
                                    <th class="pb-4 font-medium">Pos</th>
                                    <th class="pb-4 font-medium">Equipo</th>
                                    <th class="pb-4 font-medium text-right">Pts</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboard-body" class="divide-y divide-slate-800">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="text-center pt-4">
                <button onclick="location.reload()" class="text-slate-500 hover:text-red-400 text-xs uppercase tracking-widest">Reiniciar Torneo</button>
            </div>
        </section>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 transition-all duration-300">
        <div id="toast-msg" class="bg-red-500 text-white px-6 py-3 rounded-xl font-bold shadow-2xl"></div>
    </div>

    <script>
        let state = {
            numTeams: 0,
            numRounds: 0,
            currentRound: 1,
            teams: []
        };

        const POS_POINTS = { 1:15, 2:12, 3:10, 4:8, 5:6, 6:4, 7:2, 8:1, 9:1, 10:1, 11:1, 12:1, 13:1, 14:1, 15:1, 16:1 };

        function initApp() {
            state.numTeams = parseInt(document.getElementById('num-teams').value);
            state.numRounds = parseInt(document.getElementById('num-rounds').value);
            
            for(let i=1; i <= state.numTeams; i++) {
                state.teams.push({ id: i, name: `Equipo ${i}`, score: 0 });
            }

            renderInputs();
            updateDashboard();
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        }

        function renderInputs() {
            const container = document.getElementById('inputs-container');
            container.innerHTML = state.teams.map(t => `
                <div class="flex items-center gap-4">
                    <span class="flex-1 font-semibold text-slate-300">${t.name}</span>
                    <input type="number" placeholder="Pos" data-team="${t.id}" class="pos-in input-dark w-20 p-2 text-center text-accent-blue font-bold">
                    <input type="number" placeholder="Kills" data-team="${t.id}" class="kills-in input-dark w-20 p-2 text-center text-slate-400">
                </div>
            `).join('');
        }

        function processRound() {
            const posInputs = document.querySelectorAll('.pos-in');
            const killInputs = document.querySelectorAll('.kills-in');
            const usedPos = new Set();
            let roundData = [];

            // Validación estricta
            for(let i=0; i < posInputs.length; i++) {
                const p = parseInt(posInputs[i].value);
                const k = parseInt(killInputs[i].value || 0);
                const teamId = parseInt(posInputs[i].dataset.team);

                if(!p || p < 1 || p > state.numTeams) return notify(`Posición inválida para el Equipo ${teamId}`);
                if(usedPos.has(p)) return notify(`La posición ${p} ya fue asignada`);
                
                usedPos.add(p);
                roundData.push({ teamId, points: (POS_POINTS[p] || 0) + k });
            }

            // Aplicar puntos
            roundData.forEach(data => {
                const team = state.teams.find(t => t.id === data.teamId);
                team.score += data.points;
            });

            if(state.currentRound < state.numRounds) {
                state.currentRound++;
                notify("Ronda guardada con éxito", false);
                updateDashboard();
                // Limpiar campos
                posInputs.forEach(i => i.value = "");
                killInputs.forEach(i => i.value = "");
            } else {
                notify("¡Torneo Finalizado!", false);
                updateDashboard();
                document.getElementById('inputs-container').parentElement.innerHTML = `
                    <div class="text-center py-10">
                        <p class="text-5xl mb-4 text-accent-yellow">👑</p>
                        <h3 class="text-xl font-bold">Torneo Concluido</h3>
                    </div>`;
            }
        }

        function updateDashboard() {
            // Actualizar Stats
            document.getElementById('stat-round').textContent = `${state.currentRound}/${state.numRounds}`;
            document.getElementById('stat-left').textContent = state.numRounds - state.currentRound;
            document.getElementById('round-title').textContent = state.currentRound;

            // Ordenar y Renderizar Tabla
            const sorted = [...state.teams].sort((a,b) => b.score - a.score);
            document.getElementById('stat-leader').textContent = sorted[0].score > 0 ? sorted[0].name : "---";

            const body = document.getElementById('leaderboard-body');
            body.innerHTML = sorted.map((t, i) => `
                <tr class="group">
                    <td class="py-4 font-bold text-accent-blue">${i+1}</td>
                    <td class="py-4 font-semibold text-slate-200">${t.name}</td>
                    <td class="py-4 text-right font-bold text-accent-cyan">${t.score}</td>
                </tr>
            `).join('');
        }

        function notify(msg, isError = true) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            msgEl.textContent = msg;
            msgEl.style.backgroundColor = isError ? "#ef4444" : "#10b981";
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function copyToClipboard() {
            const sorted = [...state.teams].sort((a,b) => b.score - a.score);
            let text = "🏆 CLASIFICACIÓN GENERAL 🏆\n\n";
            sorted.forEach((t, i) => text += `${i+1}. ${t.name} - ${t.score} PTS\n`);
            navigator.clipboard.writeText(text);
            notify("Copiado al portapapeles", false);
        }
    </script>
</body>
</html>
